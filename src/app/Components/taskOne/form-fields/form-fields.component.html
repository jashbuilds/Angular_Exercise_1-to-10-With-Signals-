<div class="container mt-120">
    <div class="row">
        <p class="h3 text-center text-muted">Task One</p>
        <div class="col-sm-4 mt-3">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                data-bs-target="#formInputModal">Add Customer Data</button>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="formInputModal" data-bs-backdrop="static"
            data-bs-keyboard="false" tabindex="-1" #formInputModal
            aria-labelledby="formInputModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0">
                        <p class="h3 modal-title text-muted"
                            id="formInputModalLabel">Customer Details</p>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form #form="ngForm">
                            <div class="mb-3">
                                <label for="name"
                                    class="form-label">Name</label>
                                <input type="text" class="form-control" charsOnly
                                    placeholder="Name" #name="ngModel"
                                    id="name" name="name" required
                                    [(ngModel)]="nameInput"
                                    [class.is-invalid]="name.invalid && name.touched && name.dirty"
                                    [class.is-valid]="name.valid">
                                <div class="invalid-feedback">Enter valid
                                    Name!</div>
                            </div>

                            <div class="mb-3">
                                <label for="email"
                                    class="form-label">Email</label>
                                <input type="email" class="form-control"
                                    placeholder="Email" #email="ngModel"
                                    id="email" name="email" required
                                    [(ngModel)]="emailInput"
                                    [class.is-invalid]="email.invalid && email.touched && email.dirty"
                                    [class.is-valid]="email.valid">
                                <div class="invalid-feedback">Enter valid
                                    Email!</div>
                            </div>

                            <div class="mb-3">
                                <!-- Address field component -->
                                <app-address-field />
                            </div>

                            <div
                                class="d-flex align-items-center justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary"
                                    data-bs-dismiss="modal">Close</button>
                                <button type="submit"
                                    class="btn btn-primary"
                                    data-bs-dismiss="modal" (click)="onSubmit(form)"
                                    [disabled]="!isFormValid()">Submit</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
